version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: postgres_star
    environment:
      POSTGRES_DB: star_schema
      POSTGRES_USER: flink_user
      POSTGRES_PASSWORD: flink_password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./data:/mock_data:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flink_user -d star_schema"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - data_pipeline
    restart: unless-stopped

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2182:2181"
    networks:
      - data_pipeline
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "9093:9092"
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - data_pipeline
    restart: unless-stopped

  kafka-setup:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka-setup
    depends_on:
      kafka:
        condition: service_healthy
    command: bash -c "
      echo 'Waiting for Kafka to be ready...' &&
      sleep 10 &&
      echo 'Creating topic sales-topic...' &&
      kafka-topics --create --topic sales-topic --bootstrap-server kafka:9092 --partitions 3 --replication-factor 1 --if-not-exists &&
      echo 'Topic created successfully' &&
      echo 'Listing topics:' &&
      kafka-topics --list --bootstrap-server kafka:9092
      "
    networks:
      - data_pipeline

  producer:
    build:
      context: ./producer
      dockerfile: Dockerfile
    container_name: kafka-producer
    depends_on:
      kafka-setup:
        condition: service_completed_successfully
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: sales-topic
      CSV_DIRECTORY: /data
    volumes:
      - ./data:/data:ro
    networks:
      - data_pipeline
    restart: "no"
    profiles:
      - run-etl

  flink-jobmanager:
    image: flink:1.18-scala_2.12-java11
    container_name: flink-jobmanager
    ports:
      - "8082:8081"
    command: jobmanager
    environment:
      - JOB_MANAGER_RPC_ADDRESS=flink-jobmanager
    networks:
      - data_pipeline
    restart: unless-stopped

  flink-taskmanager:
    image: flink:1.18-scala_2.12-java11
    container_name: flink-taskmanager
    depends_on:
      - flink-jobmanager
    command: taskmanager
    environment:
      - JOB_MANAGER_RPC_ADDRESS=flink-jobmanager
    networks:
      - data_pipeline
    restart: unless-stopped

  flink-submitter:
    build:
      context: ./flink-job
      dockerfile: Dockerfile
    container_name: flink-submitter
    depends_on:
      kafka-setup:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: sales-topic
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: star_schema
      POSTGRES_USER: flink_user
      POSTGRES_PASSWORD: flink_password
    networks:
      - data_pipeline
    restart: "no"
    profiles:
      - run-etl

networks:
  data_pipeline:
    driver: bridge

volumes:
  postgres_data: